<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BSV Montage Stundenkonto</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Stundenkonto">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;background:#f8fafc;color:#0f172a}
button,input,select,textarea{font:inherit}button{border:1px solid #cbd5e1;background:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}
button:hover{background:#f1f5f9}.primary,.active{background:#0f172a!important;color:#fff!important;border-color:#0f172a!important}
input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px;background:#fff}textarea{min-height:80px}
.login{min-height:100vh;background:#020617;display:grid;place-items:center;padding:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:22px;box-shadow:0 20px 60px rgba(15,23,42,.08)}
.login .card{max-width:460px;width:100%;text-align:center}.logo{width:70px;height:70px;border-radius:22px;background:#0f172a;color:#fff;display:grid;place-items:center;font-size:25px;font-weight:900;margin:0 auto 12px}
.app{max-width:1400px;margin:0 auto;padding:22px;display:grid;gap:18px}.top{display:flex;justify-content:space-between;align-items:end;gap:16px;flex-wrap:wrap}
nav{display:flex;gap:8px;flex-wrap:wrap}.muted{color:#64748b;font-size:14px;margin:0 0 4px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:16px}.stat span{display:block;color:#64748b;font-size:13px}.stat b{display:block;font-size:24px;margin-top:4px;overflow:hidden;text-overflow:ellipsis}
.grid{display:grid;gap:16px}.two{grid-template-columns:1.1fr .8fr}.three{grid-template-columns:repeat(3,1fr)}.panel{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:18px;display:grid;gap:14px}
.head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.form{display:grid;gap:12px}label{display:grid;gap:5px;color:#475569;font-size:13px}
.info,.msg,.empty{background:#f1f5f9;border-radius:14px;padding:12px;color:#334155}.msg{background:#fff7ed;border:1px solid #fed7aa}.switch{display:flex;background:#f1f5f9;border-radius:14px;padding:4px;gap:4px}.switch button{flex:1;border:0}
.summary{border:1px solid #e2e8f0;border-radius:18px;padding:14px}.sumrow,.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid #f1f5f9;padding:9px 0}.row small{display:block;color:#64748b;margin-top:3px}
.tablewrap{overflow-x:auto;border:1px solid #e2e8f0;border-radius:18px}table{width:100%;min-width:1000px;border-collapse:collapse;background:#fff}th{background:#f1f5f9;color:#64748b;text-align:left;font-size:12px;text-transform:uppercase}td,th{padding:11px;border-bottom:1px solid #e2e8f0}
.ok,.pending{border-radius:999px;padding:5px 9px;font-size:12px}.ok{background:#dcfce7;color:#166534}.pending{background:#fef3c7;color:#92400e}
.personrow{display:grid;grid-template-columns:1fr 1fr 130px 1fr auto;gap:10px;align-items:center;border-bottom:1px solid #e2e8f0;padding:10px 0}
.warn{background:#ecfeff;border:1px solid #a5f3fc;border-radius:14px;padding:12px;color:#155e75;font-size:14px;text-align:left}.linkbtn{border:0;background:transparent;color:#2563eb;padding:6px;text-decoration:underline}
@media(max-width:900px){.stats,.two,.three,.personrow{grid-template-columns:1fr}.top{align-items:stretch}nav button{flex:1}}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const CONFIG = {
  companyName: "BSV Montage",
  appName: "Stundenkonto",
  supabaseUrl: "https://wdiwzghqiqctwvuvfzoy.supabase.co",
  supabaseAnonKey: "sb_publishable_c7-GmISJjbtfAM5kJc6EJg_z64f_4mA",
  adminEmail: "simic@bsv-montage.de"
};

const supabase = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
const app = document.getElementById("app");
const todayISO = () => new Date().toISOString().slice(0,10);
const monthISO = () => new Date().toISOString().slice(0,7);
function nextMonthStart(month){const [y,m]=month.split("-").map(Number);return new Date(Date.UTC(y,m,1)).toISOString().slice(0,10);}

let state = {
  session:null, profile:null, profiles:[], projects:[], entries:[], loading:true, message:"",
  tab:"daily", month:monthISO(), authMode:"login",
  authEmail:CONFIG.adminEmail, authPassword:"", authPassword2:"", authName:"",
  resetPassword1:"", resetPassword2:"",
  workerFilter:"all", projectFilter:"all", search:"",
  entry:{work_date:todayISO(), user_id:"", project_id:"", start_time:"08:00", end_time:"16:00", break_minutes:30, note:""},
  project:{name:"",customer:"",location:""}
};

function h(start,end,br){if(!start||!end)return 0;const [sh,sm]=start.split(":").map(Number),[eh,em]=end.split(":").map(Number);return Math.round(Math.max(0,eh*60+em-(sh*60+sm)-Number(br||0))/60*100)/100;}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function set(p){state={...state,...p};render();}
function isAdmin(){return state.profile?.role==="admin";}
function workers(){return state.profiles.filter(p=>p.active!==false&&p.role==="worker");}
function activeProjects(){return state.projects.filter(p=>p.active!==false);}
function group(rows,key){const m={};rows.forEach(r=>m[r[key]||"Nepoznato"]=(m[r[key]||"Nepoznato"]||0)+Number(r.hours||0));return Object.entries(m).map(([name,hours])=>({name,hours:Math.round(hours*100)/100})).sort((a,b)=>b.hours-a.hours);}
function filtered(){const q=state.search.toLowerCase();return state.entries.filter(e=>state.workerFilter==="all"||e.user_id===state.workerFilter).filter(e=>state.projectFilter==="all"||e.project_id===state.projectFilter).filter(e=>!q||(e.person_name||"").toLowerCase().includes(q)||(e.project_name||"").toLowerCase().includes(q)||(e.note||"").toLowerCase().includes(q));}
function csv(rows){const head=["Datum","Radnik","Projekat","Klijent","Lokacija","Od","Do","Pauza min","Sati","Status","Opis"];const text=[head.join(";"),...rows.map(r=>[r.work_date,r.person_name,r.project_name,r.customer||"",r.location||"",r.start_time,r.end_time,r.break_minutes,r.hours,r.status,(r.note||"").replaceAll(";",",")].join(";"))].join("\\n");const blob=new Blob([text],{type:"text/csv;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`stundenkonto-${state.month}.csv`;a.click();URL.revokeObjectURL(url);}

async function refresh(){
  if(!state.session?.user){set({loading:false});return;}
  state.loading=true;render();
  const me=await supabase.from("profiles").select("*").eq("id",state.session.user.id).single();
  if(me.error){set({message:"Profil nije pronađen. Pokreni final_rls_fix.sql u Supabase.",loading:false});return;}
  state.profile=me.data;
  const [pr,pj,en]=await Promise.all([
    supabase.from("profiles").select("*").order("full_name"),
    supabase.from("projects").select("*").order("name"),
    supabase.from("time_entries_view").select("*").gte("work_date",`${state.month}-01`).lt("work_date",nextMonthStart(state.month)).order("work_date",{ascending:false})
  ]);
  state.profiles=pr.data||[];state.projects=pj.data||[];state.entries=en.data||[];
  const w=workers(),p=activeProjects();
  if(isAdmin()){
    if(!state.entry.user_id || !w.find(x=>x.id===state.entry.user_id)) state.entry.user_id=w[0]?.id||state.profile.id;
  }else{
    state.entry.user_id=state.profile.id; // KLJUČNO: radnik uvijek šalje svoje ID, i zato može unositi unazad.
  }
  if(!state.entry.project_id) state.entry.project_id=p[0]?.id;
  set({loading:false,message:pr.error?.message||pj.error?.message||en.error?.message||""});
}

async function signIn(){const {error}=await supabase.auth.signInWithPassword({email:state.authEmail,password:state.authPassword});if(error)set({message:error.message});}
async function signUp(){
  if(!state.authEmail||!state.authPassword||!state.authPassword2){set({message:"Unesi email i lozinku dva puta."});return;}
  if(state.authPassword!==state.authPassword2){set({message:"Lozinke nisu iste."});return;}
  if(state.authPassword.length<6){set({message:"Lozinka mora imati najmanje 6 znakova."});return;}
  const cleanUrl=window.location.href.split("#")[0].split("?")[0];
  const {error}=await supabase.auth.signUp({email:state.authEmail,password:state.authPassword,options:{data:{full_name:state.authName||state.authEmail},emailRedirectTo:cleanUrl}});
  if(error)set({message:error.message});else set({message:"Registracija je poslana. Provjeri email i klikni potvrdu prije prijave.",authMode:"login",authPassword:"",authPassword2:""});
}
async function sendResetEmail(){if(!state.authEmail){set({message:"Unesi email za reset lozinke."});return;}const cleanUrl=window.location.href.split("#")[0].split("?")[0];const {error}=await supabase.auth.resetPasswordForEmail(state.authEmail,{redirectTo:cleanUrl});if(error)set({message:error.message});else set({message:"Poslali smo email za promjenu lozinke. Otvori email i klikni link."});}
async function updatePassword(){if(!state.resetPassword1||!state.resetPassword2){set({message:"Unesi novu lozinku dva puta."});return;}if(state.resetPassword1!==state.resetPassword2){set({message:"Nove lozinke nisu iste."});return;}if(state.resetPassword1.length<6){set({message:"Lozinka mora imati najmanje 6 znakova."});return;}const {error}=await supabase.auth.updateUser({password:state.resetPassword1});if(error)set({message:error.message});else set({message:"Lozinka je promijenjena. Možeš se prijaviti.",authMode:"login",resetPassword1:"",resetPassword2:""});}
async function signOut(){await supabase.auth.signOut();set({session:null,profile:null,tab:"daily"});}
async function addProject(){if(!isAdmin()||!state.project.name.trim())return;const {error}=await supabase.from("projects").insert(state.project);if(error)set({message:error.message});else{state.project={name:"",customer:"",location:""};refresh();}}
async function archiveProject(id){const {error}=await supabase.from("projects").update({active:false}).eq("id",id);if(error)set({message:error.message});else refresh();}

async function addEntry(){
  const e=state.entry;
  const uid=isAdmin()?e.user_id:state.profile.id;
  if(!uid){set({message:"Nije pronađen korisnik."});return;}
  if(!e.project_id){set({message:"Prvo izaberi projekat. Ako nema projekta, admin ga mora dodati."});return;}
  if(!e.work_date){set({message:"Izaberi datum."});return;}
  const payload={user_id:uid,project_id:e.project_id,work_date:e.work_date,start_time:e.start_time,end_time:e.end_time,break_minutes:Number(e.break_minutes||0),hours:h(e.start_time,e.end_time,e.break_minutes),note:e.note,status:isAdmin()?"approved":"submitted"};
  const {error}=await supabase.from("time_entries").insert(payload);
  if(error)set({message:error.message});
  else{state.entry.note="";state.month=e.work_date.slice(0,7);state.tab="monthly";refresh();}
}
async function approve(id){const {error}=await supabase.from("time_entries").update({status:"approved"}).eq("id",id);if(error)set({message:error.message});else refresh();}
async function delEntry(id){if(!isAdmin()){set({message:"Samo admin može brisati sate."});return;}const {error}=await supabase.from("time_entries").delete().eq("id",id);if(error)set({message:error.message});else refresh();}
async function saveProfile(id){const p=state.profiles.find(x=>x.id===id);const {error}=await supabase.from("profiles").update({full_name:p.full_name,position:p.position,role:p.role,active:p.active}).eq("id",id);if(error)set({message:error.message});else refresh();}

function loginView(){
 const isReset=state.authMode==="reset";
 app.innerHTML=`<main class="login"><section class="card">
 <div class="logo">BSV</div><h1>${CONFIG.companyName} ${CONFIG.appName}</h1><p class="muted">Online evidencija sati za radnike i projekte.</p>
 <div class="switch"><button id="modeLogin" class="${state.authMode==="login"?"active":""}">Prijava</button><button id="modeSignup" class="${state.authMode==="signup"?"active":""}">Novi korisnik</button></div>
 ${isReset?`<div class="warn">Unesi novu lozinku dva puta. Ovo radi nakon što klikneš link iz emaila za reset lozinke.</div><input id="resetPassword1" placeholder="Nova lozinka" type="password" value="${esc(state.resetPassword1)}"><input id="resetPassword2" placeholder="Ponovi novu lozinku" type="password" value="${esc(state.resetPassword2)}">`:`${state.authMode==="signup"?`<input id="authName" placeholder="Ime i prezime" value="${esc(state.authName)}">`:""}<input id="authEmail" placeholder="Email" value="${esc(state.authEmail)}"><input id="authPassword" placeholder="Lozinka" type="password" value="${esc(state.authPassword)}">${state.authMode==="signup"?`<input id="authPassword2" placeholder="Ponovi lozinku" type="password" value="${esc(state.authPassword2)}">`:""}`}
 ${state.message?`<div class="msg">${esc(state.message)}</div>`:""}
 ${isReset?`<button class="primary" id="updatePassword">Promijeni lozinku</button>`:`<button class="primary" id="authBtn">${state.authMode==="login"?"Prijavi se":"Kreiraj korisnika"}</button>`}
 ${state.authMode==="login"?`<button class="linkbtn" id="forgotBtn">Zaboravljena lozinka?</button>`:""}
 </section></main>`;
 bind("modeLogin","click",()=>set({authMode:"login",message:""}));bind("modeSignup","click",()=>set({authMode:"signup",message:""}));
 if(isReset){bindInput("resetPassword1","resetPassword1");bindInput("resetPassword2","resetPassword2");bind("updatePassword","click",updatePassword);}
 else{bindInput("authEmail","authEmail");bindInput("authPassword","authPassword");if(state.authMode==="signup"){bindInput("authName","authName");bindInput("authPassword2","authPassword2");}bind("authBtn","click",()=>state.authMode==="login"?signIn():signUp());bind("forgotBtn","click",sendResetEmail);}
}
function stat(t,v){return `<div class="stat"><span>${esc(t)}</span><b>${esc(v)}</b></div>`;}
function summary(title,rows){return `<div class="summary"><h3>${esc(title)}</h3>${rows.length?rows.map(r=>`<div class="sumrow"><span>${esc(r.name)}</span><b>${r.hours} h</b></div>`).join(""):`<p class="muted">Nema unosa.</p>`}</div>`;}
function entryForm(){const w=workers(),p=activeProjects(),e=state.entry;return `<div class="form"><div class="warn">Za unos unazad: klikni Datum i izaberi stari datum. Radnik može dodati sate samo za sebe.</div><label>Datum<input id="e_date" type="date" value="${e.work_date}"></label>${isAdmin()?`<label>Radnik<select id="e_user">${w.map(x=>`<option value="${x.id}" ${e.user_id===x.id?"selected":""}>${esc(x.full_name)}</option>`).join("")}</select></label>`:`<div class="info">Radnik: <b>${esc(state.profile?.full_name)}</b></div>`}<label>Projekat<select id="e_project">${p.map(x=>`<option value="${x.id}" ${e.project_id===x.id?"selected":""}>${esc(x.name)}</option>`).join("")}</select></label><div class="grid three"><label>Od<input id="e_start" type="time" value="${e.start_time}"></label><label>Do<input id="e_end" type="time" value="${e.end_time}"></label><label>Pauza min<input id="e_break" type="number" value="${e.break_minutes}"></label></div><div class="info">Obračun: <b>${h(e.start_time,e.end_time,e.break_minutes)} h</b></div><label>Opis<textarea id="e_note" placeholder="Opis rada...">${esc(e.note)}</textarea></label><button class="primary" id="addEntry">Sačuvaj sate</button></div>`;}
function entriesTable(rows){if(!rows.length)return `<div class="empty">Nema unosa.</div>`;return `<div class="tablewrap"><table><thead><tr><th>Datum</th><th>Radnik</th><th>Projekat</th><th>Klijent/Lokacija</th><th>Vrijeme</th><th>Pauza</th><th>Sati</th><th>Status</th><th>Opis</th><th></th></tr></thead><tbody>${rows.map(e=>`<tr><td>${e.work_date}</td><td>${esc(e.person_name)}</td><td>${esc(e.project_name)}</td><td>${esc(e.customer||"-")} · ${esc(e.location||"-")}</td><td>${e.start_time} - ${e.end_time}</td><td>${e.break_minutes} min</td><td><b>${e.hours} h</b></td><td><span class="${e.status==="approved"?"ok":"pending"}">${e.status==="approved"?"odobreno":"poslano"}</span></td><td>${esc(e.note||"")}</td><td>${isAdmin()&&e.status!=="approved"?`<button data-approve="${e.id}">Odobri</button>`:""} ${isAdmin()?`<button data-del="${e.id}">Obriši</button>`:""}</td></tr>`).join("")}</tbody></table></div>`;}
function mainView(){const rows=filtered(),monthTotal=Math.round(rows.reduce((s,e)=>s+Number(e.hours||0),0)*100)/100,daily=state.entries.filter(e=>e.work_date===state.entry.work_date);app.innerHTML=`<main class="app"><header class="top"><div><p class="muted">Prijavljen: <b>${esc(state.profile?.full_name||state.session.user.email)}</b> · ${isAdmin()?"Admin":"Radnik"}</p><h1>${CONFIG.companyName} ${CONFIG.appName}</h1></div><nav>${["dashboard","daily","monthly"].map(k=>`<button data-tab="${k}" class="${state.tab===k?"active":""}">${k==="dashboard"?"Dashboard":k==="daily"?"Unos sati":"Mjesečno"}</button>`).join("")}${isAdmin()?`<button data-tab="projects" class="${state.tab==="projects"?"active":""}">Projekti</button><button data-tab="people" class="${state.tab==="people"?"active":""}">Radnici</button>`:""}<button id="refresh">Osvježi</button><button id="logout">Odjava</button></nav></header>${state.message?`<div class="msg">${esc(state.message)}</div>`:""}<section class="stats">${stat(isAdmin()?"Radnika":"Moj profil",isAdmin()?workers().length:state.profile?.full_name)}${stat("Projekata",activeProjects().length)}${stat("Sati u mjesecu",monthTotal+" h")}${stat("Unosa",rows.length)}</section>${content(rows,daily)}</main>`;document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>set({tab:b.dataset.tab}));bind("refresh","click",refresh);bind("logout","click",signOut);bindDynamic();}
function content(rows,daily){if(state.tab==="dashboard")return `<section class="grid two"><div class="panel"><div class="head"><h2>Pregled za mjesec</h2><input id="month" type="month" value="${state.month}"></div><div class="grid two">${summary("Sati po projektu",group(rows,"project_name"))}${isAdmin()?summary("Sati po radniku",group(rows,"person_name")):""}</div></div><div class="panel"><h2>Brzi unos</h2>${entryForm()}</div></section>`;if(state.tab==="daily")return `<section class="grid two"><div class="panel"><h2>Novi unos sati</h2>${entryForm()}</div><div class="panel"><h2>Unosi za izabrani datum</h2>${entriesTable(daily)}</div></section>`;if(state.tab==="monthly")return `<section class="panel"><div class="head"><h2>Mjesečni pregled</h2><input id="month" type="month" value="${state.month}">${isAdmin()?`<select id="workerFilter"><option value="all">Svi radnici</option>${workers().map(p=>`<option value="${p.id}" ${state.workerFilter===p.id?"selected":""}>${esc(p.full_name)}</option>`).join("")}</select>`:""}<select id="projectFilter"><option value="all">Svi projekti</option>${activeProjects().map(p=>`<option value="${p.id}" ${state.projectFilter===p.id?"selected":""}>${esc(p.name)}</option>`).join("")}</select><input id="search" placeholder="Traži..." value="${esc(state.search)}"><button id="csv">CSV Export</button></div>${entriesTable(rows)}</section>`;if(state.tab==="projects"&&isAdmin())return `<section class="grid two"><div class="panel"><h2>Dodaj projekat</h2><input id="p_name" placeholder="Naziv projekta" value="${esc(state.project.name)}"><input id="p_customer" placeholder="Klijent" value="${esc(state.project.customer)}"><input id="p_location" placeholder="Lokacija" value="${esc(state.project.location)}"><button class="primary" id="addProject">Dodaj projekat</button></div><div class="panel"><h2>Projekti</h2>${activeProjects().map(p=>`<div class="row"><span><b>${esc(p.name)}</b><small>${esc(p.customer||"-")} · ${esc(p.location||"-")}</small></span><button data-archive-project="${p.id}">Obriši</button></div>`).join("")}</div></section>`;if(state.tab==="people"&&isAdmin())return `<section class="panel"><h2>Radnici i admini</h2><p class="muted">Radnik se kreira na login ekranu preko “Novi korisnik”. Ovdje mu mijenjaš ime, poziciju i prava.</p>${state.profiles.filter(p=>p.active!==false).map(p=>`<div class="personrow"><input data-p-name="${p.id}" value="${esc(p.full_name||"")}"><input data-p-position="${p.id}" placeholder="Pozicija" value="${esc(p.position||"")}"><select data-p-role="${p.id}" ${p.id===state.profile.id?"disabled":""}><option value="worker" ${p.role==="worker"?"selected":""}>Radnik</option><option value="admin" ${p.role==="admin"?"selected":""}>Admin</option></select><span class="muted">${esc(p.email)}</span><button data-save-profile="${p.id}">Sačuvaj</button></div>`).join("")}</section>`;return "";}
function bindDynamic(){const monthEl=document.getElementById("month");if(monthEl)monthEl.onchange=()=>{state.month=monthEl.value;refresh();};const wf=document.getElementById("workerFilter");if(wf)wf.onchange=()=>set({workerFilter:wf.value});const pf=document.getElementById("projectFilter");if(pf)pf.onchange=()=>set({projectFilter:pf.value});const se=document.getElementById("search");if(se)se.oninput=()=>set({search:se.value});[["e_date","work_date"],["e_user","user_id"],["e_project","project_id"],["e_start","start_time"],["e_end","end_time"],["e_break","break_minutes"],["e_note","note"]].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.onchange=el.oninput=()=>{state.entry[k]=el.value;if(k==="work_date"){state.month=el.value.slice(0,7);refresh();}else render();};});[["p_name","name"],["p_customer","customer"],["p_location","location"]].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.oninput=()=>state.project[k]=el.value;});bind("addEntry","click",addEntry);bind("addProject","click",addProject);bind("csv","click",()=>csv(filtered()));document.querySelectorAll("[data-approve]").forEach(b=>b.onclick=()=>approve(b.dataset.approve));document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delEntry(b.dataset.del));document.querySelectorAll("[data-archive-project]").forEach(b=>b.onclick=()=>archiveProject(b.dataset.archiveProject));document.querySelectorAll("[data-p-name]").forEach(el=>el.oninput=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pName);if(p)p.full_name=el.value;});document.querySelectorAll("[data-p-position]").forEach(el=>el.oninput=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pPosition);if(p)p.position=el.value;});document.querySelectorAll("[data-p-role]").forEach(el=>el.onchange=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pRole);if(p)p.role=el.value;});document.querySelectorAll("[data-save-profile]").forEach(b=>b.onclick=()=>saveProfile(b.dataset.saveProfile));}
function bind(id,event,fn){const el=document.getElementById(id);if(el)el.addEventListener(event,fn);}
function bindInput(id,key){const el=document.getElementById(id);if(el)el.oninput=()=>state[key]=el.value;}
function render(){if(!state.session?.user||state.authMode==="reset")loginView();else if(state.loading)app.innerHTML='<div class="login"><div class="card">Učitavanje...</div></div>';else mainView();}
supabase.auth.getSession().then(({data})=>{state.session=data.session;render();refresh();});
supabase.auth.onAuthStateChange((event,session)=>{state.session=session;if(event==="PASSWORD_RECOVERY")state.authMode="reset";render();if(session&&state.authMode!=="reset")refresh();});
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
</script>
</body>
</html>
