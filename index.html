<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const CONFIG = {
  companyName: "BSV Montage",
  appName: "Stundenkonto",
  supabaseUrl: "https://wdiwzghqiqctwvuvfzoy.supabase.co",
  supabaseAnonKey: "sb_publishable_c7-GmISJjbtfAM5kJc6EJg_z64f_4mA",
  adminEmail: "simic@bsv-montage.de"
};

const supabase = createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);
const app = document.getElementById("app");
const todayISO = () => new Date().toISOString().slice(0,10);
const monthISO = () => new Date().toISOString().slice(0,7);
function nextMonthStart(month){const [y,m]=month.split("-").map(Number);return new Date(Date.UTC(y,m,1)).toISOString().slice(0,10);}
function dateObj(iso){const [y,m,d]=iso.split("-").map(Number);return new Date(Date.UTC(y,m-1,d));}
function isoDate(d){return d.toISOString().slice(0,10);}
function mondayOf(date){const d=new Date(date);const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()-day+1);return d;}
const dayNames=["Ponedeljak","Utorak","Srijeda","Četvrtak","Petak","Subota","Nedelja"];

let state = {
  session:null, profile:null, profiles:[], projects:[], entries:[], loading:true, message:"",
  tab:"daily", month:monthISO(), authMode:"login",
  authEmail:CONFIG.adminEmail, authPassword:"", authPassword2:"", authName:"",
  resetPassword1:"", resetPassword2:"",
  workerFilter:"all", projectFilter:"all", search:"",
  entry:{work_date:todayISO(), user_id:"", project_id:"", start_time:"08:00", end_time:"16:00", break_minutes:30, note:""},
  project:{name:"",customer:"",location:""}, stkBalances:{}
};

function h(start,end,br){if(!start||!end)return 0;const [sh,sm]=start.split(":").map(Number),[eh,em]=end.split(":").map(Number);return Math.round(Math.max(0,eh*60+em-(sh*60+sm)-Number(br||0))/60*100)/100;}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function set(p){state={...state,...p};await loadFullMonthEntriesFallback();state.entries=normalizeEntryRows(state.entries);render();}
function isAdmin(){return state.profile?.role==="admin";}
function workers(){return state.profiles.filter(p=>p.active!==false&&p.role==="worker");}
function activeProjects(){return state.projects.filter(p=>p.active!==false);}
function group(rows,key){const m={};rows.forEach(r=>m[r[key]||"Nepoznato"]=(m[r[key]||"Nepoznato"]||0)+Number(r.hours||0));return Object.entries(m).map(([name,hours])=>({name,hours:Math.round(hours*100)/100})).sort((a,b)=>b.hours-a.hours);}


async function loadFullMonthEntriesFallback(){await reloadEntriesForCurrentMonth();}


async function loadAllMonthEntriesPaged(){
  if(!state.session)return [];
  const pageSize=1000;
  let from=0;
  let all=[];
  while(true){
    const to=from+pageSize-1;
    const {data,error}=await supabase.from("entries")
      .select("*,profiles(id,full_name,email),projects(id,name,customer)")
      .gte("work_date",monthStart())
      .lt("work_date",monthEndExclusive())
      .order("work_date",{ascending:true})
      .range(from,to);
    if(error){
      console.error("entries paged load error",error);
      break;
    }
    const batch=data||[];
    all=all.concat(batch);
    if(batch.length<pageSize)break;
    from+=pageSize;
    if(from>20000)break;
  }
  return normalizeEntryRows(all);
}
async function reloadEntriesForCurrentMonth(){
  const loaded=await loadAllMonthEntriesPaged();
  if(loaded && loaded.length>=0){
    state.entries=loaded;
  }
}

function filtered(){
  const q=(state.search||"").toLowerCase();
  const rows=normalizeEntryRows(state.entries);
  return rows.filter(e=>{
    const d=normalizeDateValue(e.work_date);
    if(!d.startsWith(state.month))return false;
    if(isAdmin() && state.workerFilter!=="all" && String(e.user_id)!==String(state.workerFilter))return false;
    if(state.projectFilter!=="all" && String(e.project_id)!==String(state.projectFilter))return false;
    if(q && !(`${e.person_name||""} ${e.project_name||""} ${e.customer||""}`).toLowerCase().includes(q))return false;
    return true;
  });
}

function buildReports(rows){
  const sorted=[...rows].sort((a,b)=>
    (a.person_name||"").localeCompare(b.person_name||"") ||
    (a.project_name||"").localeCompare(b.project_name||"") ||
    a.work_date.localeCompare(b.work_date)
  );

  const details=[["Datum","Radnik","Projekat","Klijent","Lokacija","Od","Do","Pauza min","Broj sati"]];
  sorted.forEach(r=>details.push([
    r.work_date,
    r.person_name||"",
    r.project_name||"",
    r.customer||"",
    r.location||"",
    r.start_time||"",
    r.end_time||"",
    Number(r.break_minutes||0),
    Number(r.hours||0)
  ]));

  const monthByPerson={};
  const projectPersonMap={};
  const projectDetailMap={};
  const weeklyMap={};

  sorted.forEach(r=>{
    const worker=r.person_name||"Nepoznato";
    const project=r.project_name||"Bez projekta";
    const customer=r.customer||"";
    const location=r.location||"";
    const hrs=Number(r.hours||0);

    monthByPerson[worker]=(monthByPerson[worker]||0)+hrs;

    if(!projectPersonMap[project]) projectPersonMap[project]={customer,location,people:{},total:0};
    projectPersonMap[project].people[worker]=(projectPersonMap[project].people[worker]||0)+hrs;
    projectPersonMap[project].total+=hrs;

    if(!projectDetailMap[project]) projectDetailMap[project]=[];
    projectDetailMap[project].push(r);

    const dt=dateObj(r.work_date);
    const mon=mondayOf(dt);
    const sun=new Date(mon);
    sun.setUTCDate(mon.getUTCDate()+6);
    const weekNumber=Math.ceil((((dt - new Date(Date.UTC(dt.getUTCFullYear(),0,1))) / 86400000)+1)/7);
    const weekKey=`KW ${weekNumber} ${isoDate(mon)}`;
    if(!weeklyMap[weekKey]){
      weeklyMap[weekKey]={
        weekNumber,
        from:isoDate(mon),
        to:isoDate(sun),
        rows:[],
        total:0
      };
    }
    weeklyMap[weekKey].rows.push(r);
    weeklyMap[weekKey].total+=hrs;
  });

  const monthlyAllPeople=[["Radnik","Mjesec","Ukupno sati"]];
  Object.entries(monthByPerson)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .forEach(([name,total])=>monthlyAllPeople.push([name,state.month,Math.round(total*100)/100]));
  monthlyAllPeople.push(["UKUPNO SVI",state.month,Math.round(Object.values(monthByPerson).reduce((s,x)=>s+x,0)*100)/100]);

  const projectSheets={};
  Object.entries(projectPersonMap)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .forEach(([project,info])=>{
      const sheet=[];
      sheet.push([`PROJEKAT: ${project}`]);
      sheet.push([`KLIJENT: ${info.customer||""}`]);
      sheet.push([`LOKACIJA: ${info.location||""}`]);
      sheet.push([]);
      sheet.push(["Radnik","Ukupno sati na projektu"]);
      Object.entries(info.people)
        .sort((a,b)=>a[0].localeCompare(b[0]))
        .forEach(([person,total])=>sheet.push([person,Math.round(total*100)/100]));
      sheet.push(["UKUPNO PROJEKAT",Math.round(info.total*100)/100]);
      sheet.push([]);
      sheet.push(["Detaljni unosi za projekat"]);
      sheet.push(["Datum","Radnik","Od","Do","Pauza min","Broj sati","Opis"]);
      (projectDetailMap[project]||[])
        .sort((a,b)=>a.work_date.localeCompare(b.work_date)||(a.person_name||"").localeCompare(b.person_name||""))
        .forEach(r=>sheet.push([
          r.work_date,
          r.person_name||"",
          r.start_time||"",
          r.end_time||"",
          Number(r.break_minutes||0),
          Number(r.hours||0),
          r.note||""
        ]));
      projectSheets[project]=sheet;
    });

  const weekSheets={};
  Object.entries(weeklyMap)
    .sort((a,b)=>a[1].from.localeCompare(b[1].from))
    .forEach(([key,info])=>{
      const sheet=[];
      sheet.push([`SEDMICA ${info.weekNumber}`]);
      sheet.push([`DATUMI: ${info.from} do ${info.to}`]);
      sheet.push([]);
      sheet.push(["Datum","Dan","Radnik","Projekat","Klijent","Lokacija","Broj sati"]);
      info.rows
        .sort((a,b)=>a.work_date.localeCompare(b.work_date)||(a.person_name||"").localeCompare(b.person_name||""))
        .forEach(r=>{
          const dt=dateObj(r.work_date);
          sheet.push([
            r.work_date,
            dayNames[(dt.getUTCDay()+6)%7],
            r.person_name||"",
            r.project_name||"",
            r.customer||"",
            r.location||"",
            Number(r.hours||0)
          ]);
        });
      sheet.push(["","","","","","UKUPNO SEDMICA",Math.round(info.total*100)/100]);
      weekSheets[key]=sheet;
    });

  return { monthlyAllPeople, projectSheets, weekSheets, details };
}

async function exportExcel(rows){
  const reports=buildReports(rows);
  try{
    const XLSX=await import("https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs");
    const wb=XLSX.utils.book_new();

    const cleanSheetName=(name)=>{
      return String(name||"Sheet")
        .replace(/[\\\/\?\*\[\]\:]/g," ")
        .slice(0,31)
        .trim() || "Sheet";
    };

    const addSheet=(name,data,cols)=>{
      const ws=XLSX.utils.aoa_to_sheet(data);
      if(cols) ws["!cols"]=cols.map(wch=>({wch}));
      XLSX.utils.book_append_sheet(wb,ws,cleanSheetName(name));
    };

    // PRVI LIST: svi radnici ukupno mjesečno
    addSheet("1 Ukupno mjesecno",reports.monthlyAllPeople,[28,14,16]);

    // NAKON TOGA: svaki projekat poseban list sa listom ljudi i ukupno
    if(isAdmin()){
      Object.entries(reports.projectSheets).forEach(([project,data],idx)=>{
        addSheet(`${idx+2} ${project}`,data,[28,18,14,14,14,14,40]);
      });
    }

    // NAKON TOGA: svaka sedmica poseban list
    Object.entries(reports.weekSheets).forEach(([week,data])=>{
      addSheet(week,data,[14,14,24,24,22,22,14]);
    });

    // ZADNJI LIST: detaljni unosi
    addSheet("Detaljni unosi",reports.details,[14,24,24,22,22,12,12,12,14]);

    XLSX.writeFile(wb,`stundenkonto-${state.month}.xlsx`);
  }catch(err){
    const csv=reports.monthlyAllPeople.map(row=>row.join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`stundenkonto-${state.month}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    set({message:"Excel biblioteka nije učitana, skinut je CSV izvještaj."});
  }
}

async function refresh(){
  if(state.__loadingPagedMonth)return;

  if(!state.session?.user){set({loading:false});return;}
  state.loading=true;await reloadEntriesForCurrentMonth();render();
  const me=await supabase.from("profiles").select("*").eq("id",state.session.user.id).single();
  if(me.error){set({message:"Profil nije pronađen. Pokreni no_approval_excel_fix.sql u Supabase.",loading:false});return;}
  state.profile=me.data;
  const [pr,pj,en]=await Promise.all([
    supabase.from("profiles").select("*").order("full_name"),
    supabase.from("projects").select("*").order("name"),
    supabase.from("time_entries_view").select("*").gte("work_date",monthStart()).lt("work_date",monthEndExclusive())).order("work_date",{ascending:false})
  ]);
  state.profiles=pr.data||[];state.projects=pj.data||[];state.entries=en.data||[];if(isAdmin()) await loadStundenkontoBalances();
  const w=workers(),p=activeProjects();
  if(isAdmin()){
    if(!state.entry.user_id || !w.find(x=>x.id===state.entry.user_id)) state.entry.user_id=w[0]?.id||state.profile.id;
  }else{
    state.entry.user_id=state.profile.id;
  }
  if(!state.entry.project_id) state.entry.project_id=p[0]?.id;
  set({loading:false,message:pr.error?.message||pj.error?.message||en.error?.message||""});
}

async function signIn(){const {error}=await supabase.auth.signInWithPassword({email:state.authEmail,password:state.authPassword});if(error)set({message:error.message});}
async function signUp(){
  if(!state.authEmail||!state.authPassword||!state.authPassword2){set({message:"Unesi email i lozinku dva puta."});return;}
  if(state.authPassword!==state.authPassword2){set({message:"Lozinke nisu iste."});return;}
  if(state.authPassword.length<6){set({message:"Lozinka mora imati najmanje 6 znakova."});return;}
  const cleanUrl=window.location.href.split("#")[0].split("?")[0];
  const {error}=await supabase.auth.signUp({email:state.authEmail,password:state.authPassword,options:{data:{full_name:state.authName||state.authEmail},emailRedirectTo:cleanUrl}});
  if(error)set({message:error.message});else set({message:"Registracija je poslana. Provjeri email i klikni potvrdu prije prijave.",authMode:"login",authPassword:"",authPassword2:""});
}
async function sendResetEmail(){if(!state.authEmail){set({message:"Unesi email za reset lozinke."});return;}const cleanUrl=window.location.href.split("#")[0].split("?")[0];const {error}=await supabase.auth.resetPasswordForEmail(state.authEmail,{redirectTo:cleanUrl});if(error)set({message:error.message});else set({message:"Poslali smo email za promjenu lozinke. Otvori email i klikni link."});}

function nextMonth(month){
  const [y,m]=month.split("-").map(Number);
  return new Date(Date.UTC(y,m,1)).toISOString().slice(0,7);
}
function monthTotalsFromEntries(){
  const totals={};
  state.entries.forEach(e=>{
    totals[e.user_id]=(totals[e.user_id]||0)+Number(e.hours||0);
  });
  return totals;
}
function stundenkontoRows(){
  const totals=monthTotalsFromEntries();
  const balances=state.stkBalances||{};
  return workers().map(p=>{
    const bal=balances[p.id]||{};
    const prev=Number(bal.carried_hours||0);
    const monthHours=Math.round((totals[p.id]||0)*100)/100;
    const paid=Number(bal.paid_hours||0);
    const carry=Math.round((prev+monthHours-paid)*100)/100;
    return {id:p.id,name:p.full_name||p.email||"Radnik",prev,monthHours,paid,carry};
  });
}
async function loadStundenkontoBalances(){
  if(!isAdmin()) return;
  const {data,error}=await supabase.from("stundenkonto_balances").select("*").gte("work_date",monthStart()).lt("work_date",monthEndExclusive());
  if(error){
    state.stkBalances={};
    state.message="Pokreni SQL fajl stundenkonto_balances.sql u Supabase za Stundenkonto.";
    return;
  }
  const map={};
  (data||[]).forEach(r=>{
    map[r.user_id]={carried_hours:Number(r.carried_hours||0),paid_hours:Number(r.paid_hours||0)};
  });
  state.stkBalances=map;
}
function readStundenkontoInputs(){

  document.querySelectorAll("[data-carry]").forEach(el=>{

    const raw=String(el.value||"").replace(",",".");
    map[uid]={...(map[uid]||{}),carried_hours:Number(raw||0),paid_hours:Number(map[uid]?.paid_hours||0)};
  });
  document.querySelectorAll("[data-paid]").forEach(el=>{
    const uid=el.dataset.paid;
    const raw=String(el.value||"").replace(",",".");
    map[uid]={...(map[uid]||{}),carried_hours:Number(map[uid]?.carried_hours||0),paid_hours:Number(raw||0)};
  });
  state.stkBalances=map;
}
async function saveAndTransferStundenkonto(){
  readStundenkontoInputs();
  const rows=stundenkontoRows();
  const nm=nextMonth(state.month);

  const currentRows=rows.map(r=>({
    month:state.month,
    user_id:r.id,
    carried_hours:Number(state.stkBalances?.[r.id]?.carried_hours||0),
    paid_hours:Number(state.stkBalances?.[r.id]?.paid_hours||0),
    next_carry_hours:Number(r.carry||0)
  }));

  const nextRows=rows.map(r=>({
    month:nm,
    user_id:r.id,
    carried_hours:Number(r.carry||0),
    paid_hours:0,
    next_carry_hours:0
  }));

  if(currentRows.length){
    const {error:e1}=await supabase.from("stundenkonto_balances").upsert(currentRows,{onConflict:"month,user_id"});
    if(e1) return {error:e1};
    const {error:e2}=await supabase.from("stundenkonto_balances").upsert(nextRows,{onConflict:"month,user_id"});
    if(e2) return {error:e2};
  }
  return {error:null,nextMonth:nm};
}

function calendarDashboard(rows){

function normalizeDateValue(v){
  if(!v)return "";
  const s=String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  const m=s.match(/^(\d{1,2})[.\-/](\d{1,2})[.\-/](\d{4})/);
  if(m)return `${m[3]}-${String(m[2]).padStart(2,"0")}-${String(m[1]).padStart(2,"0")}`;
  return s;
}
function personNameById(id){
  const p=(state.profiles||[]).find(x=>String(x.id)===String(id));
  return p ? (p.full_name||p.email||"-") : "-";

function projectNameById(id){
  const p=(state.projects||[]).find(x=>String(x.id)===String(id));

}
function customerByProjectId(id){
  const p=(state.projects||[]).find(x=>String(x.id)===String(id));

}

function normalizeEntryRows(rows){
  return (rows||[]).map(r=>{
    const personObj = r.profiles || r.profile || r.person || r.user || {};
    const projectObj = r.projects || r.project || {};
    const userId = r.user_id || r.profile_id || r.worker_id || personObj.id || "";
    const projectId = r.project_id || projectObj.id || "";
    const start = r.start_time || r.start || "";
    const end = r.end_time || r.end || "";
    const br = r.break_minutes ?? r.break ?? 0;
    let hrs = Number(r.hours);
    if(!Number.isFinite(hrs)) hrs = Number(h(start,end,br));
    if(!Number.isFinite(hrs)) hrs = 0;
    const workDate = normalizeDateValue(r.work_date || r.date || "");
    return {
      ...r,
      hours: hrs,
      user_id: userId,
      project_id: projectId,
      person_name: r.person_name || r.full_name || personObj.full_name || personObj.name || personNameById(userId) || r.email || personObj.email || "-",
      project_name: r.project_name || projectObj.name || projectNameById(projectId) || "-",
      customer: r.customer || projectObj.customer || customerByProjectId(projectId) || "",
      work_date: workDate
    };
  });
}

function cleanDashboardCalendar(rows){
  rows=normalizeEntryRows(rows);
  const visibleRows = isAdmin() ? filtered() : rows;

  const [year,monthNum]=state.month.split("-").map(Number);
  const monthNames=["Januar","Februar","Mart","April","Maj","Juni","Juli","August","Septembar","Oktobar","Novembar","Decembar"];
  const first=new Date(Date.UTC(year,monthNum-1,1));
  const days=new Date(Date.UTC(year,monthNum,0)).getUTCDate();
  const offset=(first.getUTCDay()+6)%7;

  const totals={};
  const details={};
  visibleRows.forEach(r=>{
    totals[r.work_date]=(totals[r.work_date]||0)+Number(r.hours||0);
    if(!details[r.work_date]) details[r.work_date]=new Set();
    if(isAdmin() && state.workerFilter==="all" && r.person_name) details[r.work_date].add(r.person_name);
    if(isAdmin() && state.projectFilter==="all" && r.project_name) details[r.work_date].add(r.project_name);
    if(!isAdmin() && r.project_name) details[r.work_date].add(r.project_name);
  });

  let cells="";
  for(let i=0;i<offset;i++){
    cells+=`<div class="cleanDay empty"></div>`;
  }

  for(let d=1; d<=days; d++){
    const iso=`${state.month}-${String(d).padStart(2,"0")}`;
    const date=new Date(Date.UTC(year,monthNum-1,d));
    const weekend=date.getUTCDay()===0 || date.getUTCDay()===6;
    const hrs=Math.round((totals[iso]||0)*100)/100;
    const small=details[iso] ? Array.from(details[iso]).slice(0,2).join(", ") : "";
    cells+=`<div class="cleanDay ${weekend?"weekend":""}" data-clean-day="${iso}">
      <div class="cleanNum">${d}</div>
      ${hrs ? `<div class="cleanHours">${hrs} h</div>` : ""}
      ${small ? `<div class="cleanSmall">${esc(small)}</div>` : ""}
    </div>`;
  }

  const total=Math.round(visibleRows.reduce((s,r)=>s+Number(r.hours||0),0)*100)/100;

  return `<section class="cleanDash">
    <div class="cleanDashHead">
      <h2>${monthNames[monthNum-1]} ${year}</h2>
      <b>${total} h</b>${isAdmin()?`<small class="muted">Ukupno unosa: ${visibleRows.length}</small>`:""}
    </div>
    ${isAdmin() ? `<div class="cleanDashFilters">
      <input id="month" type="month" value="${state.month}">
      <select id="workerFilter">
        <option value="all">Svi radnici</option>
        ${workers().map(p=>`<option value="${p.id}" ${state.workerFilter===p.id?"selected":""}>${esc(p.full_name)}</option>`).join("")}
      </select>
      <select id="projectFilter">
        <option value="all">Svi projekti</option>
        ${activeProjects().map(p=>`<option value="${p.id}" ${state.projectFilter===p.id?"selected":""}>${esc(p.name)}${p.customer ? " · " + esc(p.customer) : ""}</option>`).join("")}
      </select>
    </div>` : `<div class="cleanDashFilters" style="grid-template-columns:1fr"><input id="month" type="month" value="${state.month}"></div>`}
    ${isAdmin()?`<p class="muted">Provjera 1-3: 01=${visibleRows.filter(e=>e.work_date===state.month+"-01").length}, 02=${visibleRows.filter(e=>e.work_date===state.month+"-02").length}, 03=${visibleRows.filter(e=>e.work_date===state.month+"-03").length}</p>`:""}
    <div class="cleanWeek">${["Pon","Uto","Sri","Čet","Pet","Sub","Ned"].map(d=>`<div>${d}</div>`).join("")}</div>
    <div class="cleanGrid">${cells}</div>
  </section>`;
}

function entryForm(){const w=workers(),p=activeProjects(),e=state.entry;return `<div class="form"><label>Datum<input id="e_date" type="date" value="${e.work_date}"></label>${isAdmin()?`<label>Radnik<select id="e_user">${w.map(x=>`<option value="${x.id}" ${e.user_id===x.id?"selected":""}>${esc(x.full_name)}</option>`).join("")}</select></label>`:`<div class="info">Radnik: <b>${esc(state.profile?.full_name)}</b></div>`}<label>Projekat<select id="e_project"><option value="" selected>Obavezno izabrati projekat</option>${p.map(x=>`<option value="${x.id}">${esc(x.name)}${x.customer ? " · " + esc(x.customer) : ""}</option>`).join("")}</select></label><div class="grid three"><label>Od<input id="e_start" type="time" value="${e.start_time}"></label><label>Do<input id="e_end" type="time" value="${e.end_time}"></label><label>Pauza min<input id="e_break" type="text" inputmode="numeric" pattern="[0-9]*" value="${e.break_minutes}"></label></div><div class="info">Obračun: <b>${h(e.start_time,e.end_time,e.break_minutes)} h</b></div><button class="primary" id="addEntry">Sačuvaj sate</button></div>`;}
function entriesTable(rows){rows=normalizeEntryRows(rows);if(!rows.length)return `<div class="empty">Nema unosa.</div>`;return `<div class="tablewrap"><table><thead><tr><th>Datum</th><th>Radnik</th><th>Projekat</th><th>Klijent/Lokacija</th><th>Vrijeme</th><th>Pauza</th><th>Sati</th><th></th></tr></thead><tbody>${rows.map(e=>`<tr><td>${e.work_date}</td><td>${esc(e.person_name)}</td><td>${esc(e.project_name)}</td><td>${esc(e.customer||"-")} · ${esc(e.location||"-")}</td><td>${e.start_time} - ${e.end_time}</td><td>${e.break_minutes} min</td><td><b>${e.hours} h</b></td><td><button data-del="${e.id}">Obriši</button></td></tr>`).join("")}</tbody></table></div>`;}
function mainView(){const rows=filtered(),monthTotal=Math.round(rows.reduce((s,e)=>s+Number(e.hours||0),0)*100)/100,daily=state.entries.filter(e=>e.work_date===state.entry.work_date);app.innerHTML=`<main class="app"><header class="top"><div><p class="muted">Prijavljen: <b>${esc(state.profile?.full_name||state.session.user.email)}</b> · ${isAdmin()?"Admin":"Radnik"}</p><h1>${CONFIG.companyName} ${CONFIG.appName}</h1></div><nav>${["dashboard","daily","monthly"].map(k=>`<button data-tab="${k}" class="${state.tab===k?"active":""}">${k==="dashboard"?"Dashboard":k==="daily"?"Unos sati":"Mjesečno"}</button>`).join("")}${isAdmin()?`<button data-tab="projects" class="${state.tab==="projects"?"active":""}">Projekti</button><button data-tab="people" class="${state.tab==="people"?"active":""}">Radnici</button><button data-tab="stundenkonto" class="${state.tab==="stundenkonto"?"active":""}">Stundenkonto</button>`:""}<button id="refresh">Osvježi</button><button id="logout">Odjava</button></nav></header>${state.message?`<div class="msg">${esc(state.message)}</div>`:""}<section class="stats">${stat(isAdmin()?"Radnika":"Moj profil",isAdmin()?workers().length:state.profile?.full_name)}${stat("Projekata",activeProjects().length)}${stat("Sati u mjesecu",monthTotal+" h")}${stat("Unosa",rows.length)}</section>${safeContent(rows,daily)}</main>`;document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>set({tab:b.dataset.tab}));bind("refresh","click",refresh);bind("logout","click",signOut);bindDynamic();}

function safeContent(rows,daily){
  try{
    return content(rows,daily);
  }catch(err){
    console.error(err);
    return `<section class="panel"><h2>Greška</h2><div class="msg">${esc(err.message||err)}</div></section>`;
  }
}

function content(rows,daily){
  if(state.tab==="dashboard")return isAdmin()?`${adminDashboardSummaryFixed(filtered())}${cleanDashboardCalendar(rows)}`:`${cleanDashboardCalendar(rows)}`;

  if(state.tab==="daily")return `<section class="grid two"><div class="panel"><h2>Novi unos sati</h2>${entryForm()}</div><div class="panel"><h2>Unosi za izabrani datum</h2>${entriesTable(daily)}</div></section>`;

  if(state.tab==="monthly")return `<section class="panel"><div class="head"><h2>Mjesečni pregled</h2><input id="month" type="month" value="${state.month}">${isAdmin()?`<select id="workerFilter"><option value="all">Svi radnici</option>${workers().map(p=>`<option value="${p.id}" ${state.workerFilter===p.id?"selected":""}>${esc(p.full_name)}</option>`).join("")}</select>`:""}<select id="projectFilter"><option value="all">Svi projekti</option>${activeProjects().map(p=>`<option value="${p.id}" ${state.projectFilter===p.id?"selected":""}>${esc(p.name)}${p.customer ? " · " + esc(p.customer) : ""}</option>`).join("")}</select><input id="search" placeholder="Traži..." value="${esc(state.search)}"><button id="excel">Excel Export</button></div>${entriesTable(rows)}</section>`;

  if(state.tab==="projects"&&isAdmin())return `<section class="grid two"><div class="panel"><h2>Dodaj projekat</h2><input id="p_name" placeholder="Naziv projekta" value="${esc(state.project.name)}"><input id="p_customer" placeholder="Klijent" value="${esc(state.project.customer)}"><input id="p_location" placeholder="Lokacija" value="${esc(state.project.location)}"><button class="primary" id="addProject">Dodaj projekat</button></div><div class="panel"><h2>Projekti</h2>${activeProjects().map(p=>`<div class="personrow"><input data-project-name="${p.id}" placeholder="Naziv projekta" value="${esc(p.name||"")}"><input data-project-customer="${p.id}" placeholder="Klijent" value="${esc(p.customer||"")}"><input data-project-location="${p.id}" placeholder="Lokacija" value="${esc(p.location||"")}"><button data-save-project="${p.id}">Sačuvaj</button><button data-archive-project="${p.id}">Obriši</button></div>`).join("")}</div></section>`;

  if(state.tab==="people"&&isAdmin())return `<section class="panel"><h2>Radnici i admini</h2><p class="muted">Radnik se kreira na login ekranu preko “Novi korisnik”. Ovdje mu mijenjaš ime, poziciju i prava.</p>${state.profiles.filter(p=>p.active!==false).map(p=>`<div class="personrow"><input data-p-name="${p.id}" value="${esc(p.full_name||"")}"><input data-p-position="${p.id}" placeholder="Pozicija" value="${esc(p.position||"")}"><select data-p-role="${p.id}" ${p.id===state.profile.id?"disabled":""}><option value="worker" ${p.role==="worker"?"selected":""}>Radnik</option><option value="admin" ${p.role==="admin"?"selected":""}>Admin</option></select><span class="muted">${esc(p.email)}</span><button data-save-profile="${p.id}">Sačuvaj</button></div>`).join("")}</section>`;

  if(state.tab==="stundenkonto"&&isAdmin())return stundenkontoView();

  return "";
}


async function monthOrFilterChanged(){
  await reloadEntriesForCurrentMonth();
  render();
}

function bindDynamic(){document.querySelectorAll("[data-clean-day]").forEach(el=>el.onclick=()=>{state.entry.work_date=el.dataset.cleanDay;state.month=el.dataset.cleanDay.slice(0,7);state.tab="daily";refresh();});const monthEl=document.getElementById("month");if(monthEl)monthEl.onchange=async()=>{state.month=monthEl.value;await monthOrFilterChanged();};document.querySelectorAll("[data-day-open]").forEach(el=>el.onclick=()=>{state.entry.work_date=el.dataset.dayOpen;state.month=el.dataset.dayOpen.slice(0,7);state.tab="daily";refresh();});const wf=document.getElementById("workerFilter");if(wf)wf.onchange=()=>set({workerFilter:wf.value});const pf=document.getElementById("projectFilter");if(pf)pf.onchange=()=>set({projectFilter:pf.value});const se=document.getElementById("search");if(se)se.oninput=()=>set({search:se.value});/* entry fields are read only on save - no live refresh */[["p_name","name"],["p_customer","customer"],["p_location","location"]].forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.oninput=()=>state.project[k]=el.value;});bind("addEntry","click",addEntry);bind("addProject","click",addProject);bind("excel","click",()=>exportExcel(filtered()));document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>delEntry(b.dataset.del));document.querySelectorAll("[data-save-project]").forEach(b=>b.onclick=()=>updateProject(b.dataset.saveProject));document.querySelectorAll("[data-archive-project]").forEach(b=>b.onclick=()=>archiveProject(b.dataset.archiveProject));document.querySelectorAll("[data-p-name]").forEach(el=>el.oninput=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pName);if(p)p.full_name=el.value;});document.querySelectorAll("[data-p-position]").forEach(el=>el.oninput=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pPosition);if(p)p.position=el.value;});document.querySelectorAll("[data-p-role]").forEach(el=>el.onchange=()=>{const p=state.profiles.find(x=>x.id===el.dataset.pRole);if(p)p.role=el.value;});document.querySelectorAll("[data-save-profile]").forEach(b=>b.onclick=()=>saveProfile(b.dataset.saveProfile));
document.querySelectorAll("[data-paid],[data-carry]").forEach(el=>{
  el.oninput=()=>readStundenkontoInputs();
  el.onchange=()=>readStundenkontoInputs();
});
const saveTransferBtn=document.getElementById("saveTransfer");
if(saveTransferBtn){
  saveTransferBtn.onclick=async()=>{
    const result=await saveAndTransferStundenkonto();
    if(result.error){
      set({message:result.error.message});
    }else{
      set({message:`Prenos je sačuvan za ${result.nextMonth}.`});
      refresh();
    }
  };
}

document.querySelectorAll("[data-paid]").forEach(el=>{
  el.oninput=()=>{
    const paid=loadPaidHours();
    const raw=String(el.value||"").replace(",",".");
    paid[el.dataset.paid]=Number(raw||0);
    savePaidHours(paid);
  };
});
}
function bind(id,event,fn){const el=document.getElementById(id);if(el)el.addEventListener(event,fn);}
function bindInput(id,key){const el=document.getElementById(id);if(el)el.oninput=()=>state[key]=el.value;}
function render(){if(!state.session?.user||state.authMode==="reset")loginView();else if(state.loading)app.innerHTML='<div class="login"><div class="card">Učitavanje...</div></div>';else mainView();}
supabase.auth.getSession().then(({data})=>{state.session=data.session;render();refresh();});
supabase.auth.onAuthStateChange((event,session)=>{state.session=session;if(event==="PASSWORD_RECOVERY")state.authMode="reset";render();if(session&&state.authMode!=="reset")refresh();});
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations?.().then(regs => regs.forEach(r => r.update?.()));
}
if (window.caches) {
  caches.keys().then(keys => keys.forEach(k => caches.delete(k))).catch(()=>{});
}
</script>
